<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太陽光PJ 情報収集ツール | アズマ</title>
<style>
:root {
  --c1: #1B4332; --c1l: #52B788; --c1p: #D1FAE5;
  --c2: #1e40af; --c2p: #DBEAFE;
  --c3: #1d4ed8; --c3p: #EFF6FF;
  --c4: #92400e; --c4p: #FEF3C7;
  --c5: #4c1d95; --c5p: #EDE9FE;
  --c6: #991b1b; --c6p: #FEE2E2;
  --req: #dc2626; --amber: #b45309;
  --surf: #F4FAF7; --bg: #fff;
  --border: #d1e8dc; --text: #1c2b23; --muted: #5f7a6d;
  --r: 6px; --shad: 0 1px 6px rgba(27,67,50,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic UI",system-ui,sans-serif;font-size:13px;line-height:1.5;color:var(--text);background:var(--surf)}

/* ── HEADER ── */
.hdr{background:var(--c1);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hdr-logo{font-size:11px;font-weight:700;letter-spacing:.08em;opacity:.8;white-space:nowrap}
.hdr-facility{flex:1;font-size:15px;font-weight:700;color:var(--c1l);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-save{font-size:10px;opacity:.6;white-space:nowrap}
.hdr-btns{display:flex;gap:6px;flex-shrink:0}
.btn{padding:5px 12px;border:none;border-radius:4px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.btn-wh{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}.btn-wh:hover{background:rgba(255,255,255,.28)}
.btn-green{background:var(--c1l);color:#fff}.btn-green:hover{background:#3a9a6a}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-solid{background:var(--c1);color:#fff}.btn-solid:hover{background:#2d5f47}
.btn-outline{background:#fff;color:var(--c1);border:1px solid var(--c1)}.btn-outline:hover{background:var(--c1p)}
.btn-sheet{background:#0f9d58;color:#fff;border:1px solid #0a7c45}.btn-sheet:hover{background:#0a7c45}.btn-sheet:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:6px;font-size:12px;font-weight:700;color:#fff;z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:toastIn .3s ease}
.toast-ok{background:#16a34a}.toast-ng{background:#dc2626}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:48px;z-index:190;display:flex;overflow-x:auto;padding:0 12px;gap:2px}
.tab{padding:9px 14px 7px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:.15s}
.tab:hover{color:var(--c1)}
.tab.on{color:var(--c1)}
.tab.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--c1)}
.tab-fill{width:40px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.tab-fill-bar{height:100%;border-radius:2px;width:0%;transition:width .4s}

/* ── MAIN ── */
.main{max-width:1080px;margin:0 auto;padding:16px}
.panel{display:none}.panel.on{display:block}

/* ── SUBSECTION ── */
.sub-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--shad)}
.sub-hd{padding:8px 14px;color:#fff;font-weight:700;font-size:11px;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
.sub-hd-pct{font-size:10px;opacity:.8;font-weight:400}

/* ── FIELD ROWS ── */
.frow{display:grid;grid-template-columns:26px minmax(160px,1.4fr) 20px minmax(180px,2fr) 64px;border-bottom:1px solid var(--border);min-height:38px;align-items:stretch}
.frow:last-child{border-bottom:none}
.frow:hover{background:#fafffe}
.fno{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);padding:0 2px;border-right:1px solid var(--border)}
.flbl{display:flex;align-items:center;padding:6px 10px 6px 8px;font-size:12px;font-weight:600;border-right:1px solid var(--border);line-height:1.4}
.flbl-txt{flex:1}
.freq{display:flex;align-items:center;justify-content:center;color:var(--req);font-size:11px;font-weight:700;border-right:1px solid var(--border);padding:0 3px}
.finp{display:flex;align-items:center;padding:4px 6px}
.funit{display:flex;align-items:center;padding:4px 6px;font-size:11px;color:var(--muted);border-left:1px solid var(--border);white-space:nowrap;min-width:60px}
.btn-link{margin-left:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--c1);border:1px solid var(--c1);border-radius:4px;text-decoration:none;white-space:nowrap;cursor:pointer;flex-shrink:0}
.btn-link:hover{background:var(--c1p)}
.btn-link.disabled{opacity:.35;pointer-events:none;cursor:default}
.multi-wrap{display:flex;flex-direction:column;gap:4px;width:100%}
.multi-row{display:flex;align-items:center;gap:4px}
.multi-row input{flex:1}
.btn-multi{padding:2px 6px;border:none;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4}
.btn-multi-add{background:var(--c1p);color:var(--c1)}.btn-multi-add:hover{background:#b0e8cc}
.btn-multi-del{background:#fee2e2;color:#dc2626}.btn-multi-del:hover{background:#fecaca}

/* ── INPUTS ── */
input[type=text],input[type=number],select,textarea{width:100%;padding:5px 7px;border:1px solid #c8ddd4;border-radius:4px;font-family:inherit;font-size:12px;color:var(--text);background:#fff;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c1l);box-shadow:0 0 0 2px rgba(82,183,136,.2)}
input.ok,select.ok,textarea.ok{background:#f0fff8;border-color:#86efac}
.req-empty{border-color:var(--req)!important;background:#fff5f5!important}
textarea{resize:vertical;min-height:52px}
select{-webkit-appearance:auto}

/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:16px}
.dash-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shad)}
.dash-card h3{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.dash-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer}
.dash-row:last-child{border-bottom:none}
.dash-row:hover .dash-rname{color:var(--c1)}
.dash-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.dash-rname{flex:1;font-size:12px;font-weight:600}
.dash-pct{font-size:11px;font-weight:700;width:32px;text-align:right}
.dash-bar{width:72px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.dash-barfill{height:100%;border-radius:3px}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:3px}
.meta-item input,.meta-item select{font-size:12px}

.total-gauge{text-align:center;padding:16px 0}
.gauge-num{font-size:40px;font-weight:900;color:var(--c1);line-height:1}
.gauge-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.gauge-bar{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:12px}
.gauge-barfill{height:100%;background:var(--c1l);border-radius:4px;transition:width .5s}

/* ── CHECKLIST ── */
.chk-section{margin-bottom:16px}
.chk-section h3{font-size:12px;font-weight:700;color:var(--c1);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--c1p)}
.chk-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.chk-item:last-child{border-bottom:none}
.chk-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px}
.chk-ok{background:#dcfce7;color:#16a34a}
.chk-ng{background:#fee2e2;color:#dc2626}
.chk-body{flex:1;font-size:11px}
.chk-title{font-weight:700;margin-bottom:2px}
.chk-fields{color:var(--req);font-size:10px;line-height:1.6}

/* ── ALERTS ── */
.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:5px;padding:9px 12px;font-size:11px;color:#78350f;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.notice-icon{flex-shrink:0;font-size:13px}

/* ── PRINT ── */
@media print{
  header,nav,.navbar,button,.btn,.no-print,[role="navigation"]{display:none!important}
  .hdr .hdr-btns,.tabs,.print-hide{display:none!important}
  @page{margin-top:28px;margin-bottom:6px;margin-left:8px;margin-right:8px}
  .hdr{position:fixed;top:0;left:0;right:0;z-index:9999;height:22px;padding:2px 10px;box-shadow:none;border-bottom:1px solid #ccc;font-size:9pt;gap:6px!important;overflow:hidden}
  .hdr-logo{font-size:8pt!important}
  .hdr-facility{font-size:10pt!important}
  .hdr-save{display:none!important}
  body{background:#fff!important;color:#000!important;font-size:13pt;line-height:1.65;margin:0;padding:0}
  .main{padding-top:22px!important;padding-left:0!important;padding-right:0!important}
  .container,.main-content,.dashboard-wrapper,.main{width:88%!important;max-width:88%!important;margin:0 auto!important;box-shadow:none!important}
  #panel-dashboard{display:none!important}
  .card,.panel{border:none!important;margin:0 auto 10px auto!important;box-shadow:none!important;max-width:100%!important}
  .panel{display:block!important;break-before:auto}
  .sec-heading{display:block!important;font-size:13pt!important;padding:4px 10px!important;margin:0 auto 6px auto!important;border-radius:3px!important}
  #panel-1 .sec-heading{padding-top:6px!important}
  #panel-2,#panel-3,#panel-4,#panel-5,#panel-6{break-before:page}
  #panel-2 .sec-heading,#panel-3 .sec-heading,#panel-4 .sec-heading,#panel-5 .sec-heading,#panel-6 .sec-heading{padding-top:20px!important}
  .sub-card{break-inside:avoid;box-shadow:none!important;border:1px solid #ccc!important;margin:0 auto 8px auto!important;overflow:visible!important}
  .sub-hd{padding:3px 8px!important;font-size:11pt!important;line-height:1.6}
  .frow{min-height:28px!important;border-bottom:1px solid #eee!important;line-height:1.65!important}
  .flbl{padding:3px 6px!important;font-size:11pt!important;line-height:1.6}
  .finp{padding:3px 6px!important}
  .finp input,.finp select,.finp textarea{font-size:11pt!important;padding:2px 4px!important;border:none!important;background:transparent!important;line-height:1.6!important}
  .funit{padding:2px 4px!important;font-size:10pt!important;min-width:30px!important}
  .fno{font-size:10pt!important;padding:2px!important;width:20px!important}
  .freq{font-size:10pt!important;padding:2px!important;width:16px!important}
  #panel-2 .sub-card{page-break-after:auto!important;break-after:auto!important}
  .sec-heading{break-after:avoid!important;page-break-after:avoid!important}
  #panel-checklist{break-before:page!important;break-inside:avoid!important;padding-top:24px!important}
  #panel-checklist .dash-card>h3{break-after:avoid!important;page-break-after:avoid!important}
  .chk-section{break-inside:avoid!important;margin-bottom:6px!important}
  .chk-section h3{break-after:avoid!important;page-break-after:avoid!important;font-size:11pt!important;line-height:1.6!important}
  .chk-section label{font-size:11pt!important;line-height:1.6!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;padding:20px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--c1)}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal textarea{width:100%;height:120px;font-size:10px;font-family:monospace;margin-bottom:12px;padding:8px;border:1px solid var(--border);border-radius:4px;resize:vertical}
.modal input[type=file]{font-size:12px;margin-bottom:12px}

/* ── DROP OVERLAY ── */
.drop-overlay{position:fixed;inset:0;z-index:9999;background:rgba(27,67,50,.12);border:4px dashed var(--c1l);pointer-events:none;display:none;align-items:center;justify-content:center}
.drop-overlay.active{display:flex}
.drop-overlay-msg{background:#fff;padding:16px 32px;border-radius:8px;font-size:15px;font-weight:700;color:var(--c1);box-shadow:0 4px 20px rgba(0,0,0,.15)}

@media(max-width:600px){
  .frow{grid-template-columns:22px 1fr 18px 1fr 52px}
  .dash-grid{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="drop-overlay" id="drop-overlay"><div class="drop-overlay-msg">📂 JSONファイルをドロップして読み込み</div></div>
<div id="app"></div>
<div id="modal-root"></div>

<script>
// ============================================================
// FIELD DEFINITIONS (スプレッドシート完全対応 No.1〜123)
// ============================================================
const SEC = [
  {id:1,num:'①',title:'基本情報',color:'#1B4332',light:'#D1FAE5',subs:[
    {id:'1-1',title:'案件情報',fields:[
      {no:'*',key:'andpadId',lbl:'ANDPADシステムID',req:false,type:'t',hint:'ANDPADのシステムID（数値）'},
      {no:'*',key:'andpadUrl',lbl:'ANDPADのURL',req:false,type:'t',hint:'https://key.andpad.jp/...'},
      {no:1,key:'facilityName',lbl:'ANDPAD案件名',req:true,type:'t',hint:'ANDPADに登録した案件名（例: ○○工場太陽光発電設備工事）'},
      {no:2,key:'address',lbl:'所在地（住所）',req:true,type:'t',hint:'郵便番号・地番まで含めた完全な住所'},
      {no:3,key:'latLng',lbl:'緯度・経度',req:false,type:'t',hint:'Google Mapsから取得 / 度表記'},
      {no:4,key:'buildingUse',lbl:'建物用途',req:true,type:'s',opts:['工場','倉庫','事務所','店舗','物流','学校・公共','その他']},
      {no:5,key:'buildingAge',lbl:'築年数',req:true,type:'n',unit:'年',hint:'屋根の経年劣化判断'},
      {no:6,key:'startTarget',lbl:'稼働開始希望時期',req:false,type:'t',hint:'2026年Q3（9月稼働）'},
    ]},
    {id:'1-2',title:'担当者情報',fields:[
      {no:7,key:'clientContact',lbl:'施主側 主担当者',req:true,type:'t',hint:'氏名・所属・役職'},
      {no:8,key:'clientPhone',lbl:'施主側 連絡先（TEL/Email）',req:true,type:'t',hint:'緊急連絡可能なものを優先'},
      {no:9,key:'techContact',lbl:'技術窓口（電気主任技術者等）',req:true,type:'t',hint:'電気的成立性確認時の窓口'},
      {no:10,key:'projectMgr',lbl:'プロジェクト責任者（弊社側）',req:false,type:'t',hint:'本シートの最終確認者'},
    ]},
    {id:'1-3',title:'電力契約区分',fields:[
      {no:11,key:'utilityCompany',lbl:'電力会社（契約先）',req:true,type:'t',hint:'送配電事業者名（小売とは別）'},
      {no:12,key:'contractType',lbl:'契約種別',req:true,type:'s',opts:['低圧電灯','低圧電力','高圧','特別高圧']},
      {no:13,key:'electricRate',lbl:'現契約 電気料金単価（実績）',req:true,type:'n',unit:'円/kWh',hint:'直近12ヶ月の請求書平均'},
    ]},
  ]},
  {id:2,num:'②',title:'屋根・設置条件',color:'#1e40af',light:'#DBEAFE',subs:[
    {id:'2-1',title:'屋根種別・設置方法',fields:[
      {no:14,key:'roofShape',lbl:'屋根形状',req:true,type:'s',opts:['折板（はぜ締め型）','折板（重ね式）','瓦棒','陸屋根','瓦','スレート','その他']},
      {no:15,key:'roofMaterial',lbl:'屋根材',req:true,type:'t',hint:'材質・板厚を記載（架台選定の判断材料）'},
      {no:16,key:'mountingFrame',lbl:'使用架台',req:true,type:'t',hint:'メーカー / 架台種類 / 個数'},
      {no:17,key:'roofFaces',lbl:'屋根面数',req:true,type:'n',unit:'面',hint:'切妻=2面、寄棟=4面、片流れ=1面'},
      {no:18,key:'roofTotalArea',lbl:'屋根全体面積',req:true,type:'n',unit:'㎡',hint:'図面または現地実測値'},
      {no:19,key:'pvEffArea',lbl:'PV設置可能 有効面積',req:true,type:'n',unit:'㎡',hint:'障害物・離隔・点検通路を除く'},
    ]},
    {id:'2-2',title:'方位・傾斜',fields:[
      {no:20,key:'azimuth',lbl:'方位（真南からの偏角）',req:true,type:'t',unit:'度',hint:'真南=0°、東=-90°、西=+90°、各面ごとに記載'},
      {no:21,key:'roofSlope',lbl:'屋根勾配',req:true,type:'t',unit:'寸 or 度',hint:'発電量試算に必須'},
    ]},
    {id:'2-3',title:'障害物・離隔条件',fields:[
      {no:22,key:'roofObstacles',lbl:'屋根上の障害物',req:true,type:'t',hint:'天窓/ダクト/室外機/避雷針/看板 等を全列挙'},
      {no:23,key:'shadowSources',lbl:'影の発生源（隣接建物・樹木等）',req:true,type:'t',hint:'周辺建物・樹木の高さと方位'},
      {no:24,key:'edgeClearance',lbl:'端部離隔（要求値）',req:false,type:'n',unit:'mm',hint:'屋根端から500mm 等'},
    ]},
    {id:'2-4',title:'荷重条件（JIS C 8955準拠）',fields:[
      {no:25,key:'snowDepth',lbl:'設計用 地上積雪量（垂直積雪量）',req:true,type:'n',unit:'m',hint:'JIS C 8955。建設地の特定行政庁指定値'},
      {no:26,key:'windSpeed',lbl:'基準風速 V₀',req:true,type:'n',unit:'m/s',hint:'JIS C 8955 / 建築基準法施行令87条'},
      {no:27,key:'roughnessClass',lbl:'地表面粗度区分',req:true,type:'s',opts:['Ⅰ（海上等）','Ⅱ（田園・郊外）','Ⅲ（一般市街地）','Ⅳ（都市部高層密集）']},
      {no:28,key:'buildingHeight',lbl:'建物高さ H',req:true,type:'n',unit:'m',hint:'GL〜屋根頂部までの高さ'},
      {no:29,key:'importanceFactor',lbl:'用途係数 I',req:false,type:'n',hint:'通常1.0 / 避難所等は1.32'},
      {no:30,key:'structuralCalc',lbl:'構造計算書の有無',req:true,type:'s',opts:['有（取得可）','有（取得不可）','無']},
      {no:31,key:'panelLoadEstimate',lbl:'想定積載荷重（パネル+架台）',req:false,type:'n',unit:'kg/㎡',hint:'通常15〜25 kg/㎡'},
      {no:32,key:'allowableLoad',lbl:'屋根の許容積載荷重',req:true,type:'n',unit:'kg/㎡',hint:'構造計算書または設計図書から確認'},
    ]},
  ]},
  {id:3,num:'③',title:'電気条件',color:'#1d4ed8',light:'#EFF6FF',subs:[
    {id:'3-1',title:'受電設備',fields:[

// Meta fields (not numbered in the spec)
const META_KEYS = ['andpadId','createdDate','lastEditor','finalChecker','estimateEditor','progress','ver'];

// ============================================================
// STATE
// ============================================================
let state = {};
let metaState = {createdDate:'',lastEditor:'',progress:'記入中',memo:'',drawingUrl:''};
let currentTab = 'dashboard';
const STORE_KEY = 'pv_info_sheet_v1';
const META_KEY  = 'pv_info_meta_v1';

function loadState(){
  try{ state = JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){state={};}
  try{ const m=JSON.parse(localStorage.getItem(META_KEY)||'{}'); metaState={...metaState,...m}; }catch(e){}
}
function saveState(){
  localStorage.setItem(STORE_KEY,JSON.stringify(state));
  localStorage.setItem(META_KEY,JSON.stringify(metaState));
  document.getElementById('save-ts').textContent='保存: '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
function getVal(key){ return state[key]??''; }
function setVal(key,val){ state[key]=val; saveState(); updateProgress(); }
function setMeta(key,val){ metaState[key]=val; saveState(); if(key==='facilityName'||key==='andpadId') updateHeader();}

// ============================================================
// PROGRESS CALCULATION
// ============================================================
function calcSectionProgress(secId){
  const sec = SEC.find(s=>s.id===secId);
  if(!sec) return {filled:0,total:0,pct:0};
  let total=0,filled=0;
  sec.subs.forEach(sub=>sub.fields.forEach(f=>{
    if(f.req){total++;if(getVal(f.key)!=='')filled++;}
  }));
  return {filled,total,pct:total?Math.round(filled/total*100):0};
}
function calcTotalProgress(){
  let t=0,f=0;
  SEC.forEach(s=>{const p=calcSectionProgress(s.id);t+=p.total;f+=p.filled;});
  return {filled:f,total:t,pct:t?Math.round(f/t*100):0};
}
function updateProgress(){
  // Update tab fill bars
  SEC.forEach(s=>{
    const p=calcSectionProgress(s.id);
    const bar=document.getElementById(`tfill-${s.id}`);
    if(bar){bar.style.width=p.pct+'%';bar.style.background=s.color;}
    const tabPct=document.getElementById(`tpct-${s.id}`);
    if(tabPct) tabPct.textContent=p.pct+'%';
  });
  // Update total in header and dashboard
  const tot=calcTotalProgress();
  const totEl=document.getElementById('total-pct-txt');
  if(totEl) totEl.textContent=tot.pct+'%';
  const totBar=document.getElementById('total-pct-bar');
  if(totBar) totBar.style.width=tot.pct+'%';
  const gaugeNum=document.getElementById('gauge-num');
  if(gaugeNum) gaugeNum.textContent=tot.pct+'%';
  const gaugeBarFill=document.getElementById('gauge-barfill');
  if(gaugeBarFill) gaugeBarFill.style.width=tot.pct+'%';
  // Update section badges on dashboard
  SEC.forEach(s=>{
    const p=calcSectionProgress(s.id);
    const dp=document.getElementById(`dpct-${s.id}`);
    const db=document.getElementById(`dbar-${s.id}`);
    const dc=document.getElementById(`dcount-${s.id}`);
    if(dp){dp.textContent=p.pct+'%';dp.style.color=p.pct===100?'#16a34a':p.pct>50?s.color:s.color;}
    if(db){db.style.width=p.pct+'%';db.style.background=s.color;}
    if(dc) dc.textContent=`${p.filled}/${p.total} 必須入力済`;
  });
  // Update header facility name
  updateHeader();
  // Update checklist
  renderChecklist();
}
function updateHeader(){
  const f=document.getElementById('header-facility');
  if(f) f.textContent=getVal('facilityName')||'案件名未入力';
}

// ============================================================
// RENDERING
// ============================================================
function fieldHtml(f){
  const val=getVal(f.key);
  const filled=val!=='';
  let inputHtml='';
  if(f.type==='s'){
    const opts=(f.opts||[]).map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('');
    inputHtml=`<select class="${filled?'ok':''}" data-key="${f.key}" onchange="handleChange(this)"><option value="">-- 選択 --</option>${opts}</select>`;
  } else if(f.type==='multi'){
    const vals=val?val.split(',').map(v=>v.trim()):[''];
    const rows=vals.map((v,i)=>{
      const del=i>0?`<button class="btn-multi btn-multi-del" onclick="multiDel('${f.key}',${i})">❌</button>`:'';

    inputHtml=`<textarea class="${filled?'ok':''}" data-key="${f.key}" placeholder="${esc(f.hint||'')}" oninput="handleChange(this)">${esc(val)}</textarea>`;

function handleChange(el){
  const key=el.dataset.key;
  const val=el.value;
  state[key]=val;
  if(val!==''){el.classList.add('ok');el.classList.remove('req-empty');}
  else{el.classList.remove('ok');}
  if(key==='andpadUrl'){
    const lnk=document.getElementById('andpad-link');
    if(lnk){if(val){lnk.href=val;lnk.classList.remove('disabled');}else{lnk.removeAttribute('href');lnk.classList.add('disabled');}}
  }
  saveState();
  updateProgress();
}
function handleMeta(key,val){
  metaState[key]=val;
  saveState();
  if(key==='facilityName') updateHeader();
}
function updateDrawingLink(){
  const lnk=document.getElementById('drawing-link');
  const u=metaState.drawingUrl||'';
  if(lnk){if(u){lnk.href=u;lnk.classList.remove('disabled');}else{lnk.removeAttribute('href');lnk.classList.add('disabled');}}
}
function multiGetVals(key){
  const wrap=document.getElementById('multi-'+key);
  if(!wrap) return [];
  return Array.from(wrap.querySelectorAll('input[type=number]')).map(i=>i.value.trim());
}
function multiSync(key){
  const vals=multiGetVals(key).filter(v=>v!=='');
  state[key]=vals.join(', ');
  saveState();updateProgress();
}
function multiUpdate(key,el,idx){ multiSync(key); }
function multiAdd(key){
  const wrap=document.getElementById('multi-'+key);
  if(!wrap) return;
  const btn=wrap.querySelector('.btn-multi-add');
  const idx=wrap.querySelectorAll('.multi-row').length;
  const row=document.createElement('div');
  row.className='multi-row';
  row.innerHTML=`<input type="number" placeholder="" oninput="multiUpdate('${key}',this,${idx})"><button class="btn-multi btn-multi-del" onclick="multiDel('${key}',${idx})">❌</button>`;
  wrap.insertBefore(row,btn);
}
function multiDel(key,idx){
  const wrap=document.getElementById('multi-'+key);
  if(!wrap) return;
  const rows=wrap.querySelectorAll('.multi-row');
  if(rows.length<=1) return;
  rows[idx].remove();
  multiSync(key);
}
function switchTab(id){
  // Normalize: section IDs are numbers; dashboard/checklist are strings
  const nid = (id!=='dashboard'&&id!=='checklist') ? Number(id) : id;
  currentTab=nid;
  // Update tab classes
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const tabEls=document.querySelectorAll('.tab');
  const tabs=[{id:'dashboard'},...SEC.map(s=>({id:s.id})),{id:'checklist'}];
  tabs.forEach((t,i)=>{if(t.id===nid&&tabEls[i]) tabEls[i].classList.add('on');});
  // Update panel visibility
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const panel=document.getElementById(`panel-${nid}`);
  if(panel) panel.classList.add('on');
  window.scrollTo(0,0);
  if(nid==='checklist') renderChecklist();
}

function doExport(){
  const facility=(getVal('facilityName')||'案件名').replace(/[\s\/\\:*?"<>|]/g,'-');
  const andpad=(extractAndpadId(getVal('andpadId'))||'ANDPAD_ID');
  const payload={
    _meta:{...metaState,exportedAt:new Date().toISOString(),tool:'pv-info-sheet-v1'},
    data:{...state}
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${andpad}-${facility}.json`;a.click();
  URL.revokeObjectURL(url);
}
function loadFromGAS(){
  const btn=document.getElementById('btn-load');
  const id=extractAndpadId(getVal('andpadId'));
  if(!id){
    showToast('ANDPADシステムIDを入力してから読込してください',false);
    return;
  }
  if(btn){btn.disabled=true;btn.textContent='📂 読込中…';}
  fetch(GAS_URL,{
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'load',andpadId:id})
  }).then(r=>{
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(res=>{
    if(res.status!=='success') throw new Error(res.message||'データが見つかりません');
    restoreFromSheet(res.data);
    showToast('スプレッドシートからデータを復元しました',true);
  }).catch(err=>{
    showToast('読込失敗: '+err.message,false);
  }).finally(()=>{
    if(btn){btn.disabled=false;btn.textContent='📂 読込';}
  });
}
function restoreFromSheet(data){
  const metaLabelMap={
    '作成日':'createdDate','記入者':'lastEditor','進捗':'progress',
    '伝達事項':'memo','図面格納先URL':'drawingUrl'
  };
  const fieldLabelMap={};
  SEC.forEach(s=>s.subs.forEach(sub=>sub.fields.forEach(f=>{
    const label='No.'+(f.no==='*'?'-':f.no)+' '+f.lbl;
    fieldLabelMap[label]=f;
  })));
  Object.keys(data).forEach(label=>{
    const val=data[label]!=null?String(data[label]):'';
    if(label==='ANDPADシステムID'){state['andpadId']=val;return;}
    if(label==='ANDPADのURL'){state['andpadUrl']=val;return;}
    if(metaLabelMap[label]){metaState[metaLabelMap[label]]=val;return;}
    const f=fieldLabelMap[label];
    if(f) state[f.key]=val;
  });
  saveState();
  renderApp();
  updateProgress();
}

function esc(s){
  if(!s&&s!==0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function extractAndpadId(val){
  if(!val) return '';
  const m=val.match(/andpad\.jp\/[^/]*\/(\d+)/)||val.match(/andpad\.jp\/.*[?&]id=(\d+)/);
  if(m) return m[1];
  return val.replace(/\s/g,'');
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbw9GDpwp2voLD5l2fsRriRqwNOOH2FoDEgpJPiuU0INCj8mNiwGa8lI7IrW7QyT4k6E/exec';

function showToast(msg, ok){
  const el = document.createElement('div');

// GAS スプレッドシート送信
// ============================================================
function buildSpreadsheetPayload(){
  const headers = [];
  const values = [];
  headers.push('送信日時');
  values.push(new Date().toLocaleString('ja-JP'));
  headers.push('ANDPADシステムID');
  values.push(extractAndpadId(getVal('andpadId'))||'');
  headers.push('ANDPADのURL');
  values.push(getVal('andpadUrl')||'');
  headers.push('作成日');
  values.push(metaState.createdDate||'');
  headers.push('記入者');
  values.push(metaState.lastEditor||'');
  headers.push('伝達事項');
  values.push(metaState.memo||'');
  headers.push('図面格納先URL');
  values.push(metaState.drawingUrl||'');
  headers.push('進捗');
  values.push(metaState.progress||'');
  SEC.forEach(sec=>{
    sec.subs.forEach(sub=>{
      sub.fields.forEach(f=>{
        if(f.key==='andpadId'||f.key==='andpadUrl') return;
        const label = 'No.'+(f.no==='*'?'-':f.no)+' '+f.lbl;
        headers.push(label);
        if(f.type==='multi'){
          const live=multiGetVals(f.key).filter(v=>v!=='');
          values.push(live.length?live.join(', '):(getVal(f.key)||''));
        } else {
          values.push(getVal(f.key));
        }
      });
    });
  });
  return {
    headers: headers,
    values: values,
    andpadId: extractAndpadId(getVal('andpadId'))||'',
    facilityName: getVal('facilityName')||''
  };
}

function sendToGAS(){
  const btn = document.getElementById('btn-sheet');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '📊 送信中…';
  const payload = buildSpreadsheetPayload();
  fetch(GAS_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload)
  }).then(r=>{
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(()=>{
    showToast('スプレッドシートへの送信が完了しました', true);
  }).catch(err=>{
    showToast('送信に失敗しました: ' + err.message, false);
  }).finally(()=>{
    btn.disabled = false;
    btn.textContent = '📊 スプレッドシートに送信';
  });
}

// ============================================================
// DRAG & DROP IMPORT
// ============================================================
(function(){
  let dragCounter=0;
  const ov=()=>document.getElementById('drop-overlay');
  document.addEventListener('dragenter',e=>{e.preventDefault();dragCounter++;ov().classList.add('active');});
  document.addEventListener('dragleave',e=>{e.preventDefault();dragCounter--;if(dragCounter<=0){dragCounter=0;ov().classList.remove('active');}});
  document.addEventListener('dragover',e=>{e.preventDefault();});
  document.addEventListener('drop',e=>{
    e.preventDefault();dragCounter=0;ov().classList.remove('active');
    const file=e.dataTransfer.files[0];
    if(!file||!file.name.endsWith('.json')) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed.data){
          state={...parsed.data};
          if(parsed._meta) metaState={...metaState,...parsed._meta};
        } else {
          state={...parsed};
        }
        saveState();renderApp();updateProgress();
        alert('✅ ドロップしたファイルからデータを読み込みました。');
      }catch(err){alert('❌ 読み込みエラー: JSONが正しくありません。\n'+err.message);}
    };
    reader.readAsText(file);
  });
})();

// ============================================================
// INIT
// ============================================================
loadState();
renderApp();
updateProgress();
// After render, update progress bars
setTimeout(()=>updateProgress(),50);
</script>
</body>
</html>
